name: Update animal welfare news

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-news
  cancel-in-progress: true

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Refresh news JSON
        run: npm run news:update
      - name: Validate content
        run: npm run validate:content
      - name: Commit news changes
        run: |
          if git diff --quiet -- src/content/news public/images/news; then
            echo "No news changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/news public/images/news
          git commit -m "Update animal welfare news"
          git push
